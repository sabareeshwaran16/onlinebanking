<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Banking System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            /* text-shadow: 2px 2px 4px rgba(0,0,0,0.1); */
        }

        .header p {
            font-size: 1.1rem;
            color: #7f8c8d;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .section:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.4rem;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        button {
            background: #3498db;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            margin-right: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-view {
            background: #27ae60;
            margin: 5px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
        }

        .success {
            background: #2ecc71;
            color: white;
            border: none;
        }

        .error {
            background: #e74c3c;
            color: white;
            border: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        th,
        td {
            padding: 15px 12px;
            text-align: left;
        }

        th {
            background: #3498db;
            color: white;
            font-weight: 600;
        }

        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        tr:hover {
            background-color: #e3f2fd;
        }

        .view-section {
            grid-column: 1 / -1;
            text-align: center;
        }

        .icon {
            font-size: 1.2rem;
            margin-right: 8px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🏦 SecureBank Online</h1>
        <p>Your trusted partner for secure banking solutions</p>
    </div>

    <div class="container">

        <!-- User Registration Section -->
        <div class="section">
            <h2><span class="icon">👤</span>User Registration</h2>
            <form id="userForm">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                <div class="form-group">
                    <label for="phoneNumber">Phone Number:</label>
                    <input type="text" id="phoneNumber" name="phoneNumber">
                </div>
                <button type="submit">Register User</button>
            </form>
            <div id="userResult" class="result" style="display: none;"></div>
        </div>

        <!-- Account Creation Section -->
        <div class="section">
            <h2><span class="icon">🏦</span>Create Account</h2>
            <form id="accountForm">
                <div class="form-group">
                    <label for="userId">User ID:</label>
                    <input type="number" id="userId" name="userId" required>
                </div>
                <div class="form-group">
                    <label for="accountType">Account Type:</label>
                    <select id="accountType" name="accountType" required>
                        <option value="">Select Account Type</option>
                        <option value="SAVINGS">Savings</option>
                        <option value="CURRENT">Current</option>
                        <option value="FIXED_DEPOSIT">Fixed Deposit</option>
                    </select>
                </div>
                <button type="submit">Create Account</button>
            </form>
            <div id="accountResult" class="result" style="display: none;"></div>
        </div>

        <!-- Deposit Section -->
        <div class="section">
            <h2><span class="icon">💰</span>Deposit Money</h2>
            <form id="depositForm">
                <div class="form-group">
                    <label for="depositAccount">Account Number:</label>
                    <input type="text" id="depositAccount" name="accountNumber" required>
                </div>
                <div class="form-group">
                    <label for="depositAmount">Amount:</label>
                    <input type="number" id="depositAmount" name="amount" step="0.01" required>
                </div>
                <button type="submit">Deposit</button>
            </form>
            <div id="depositResult" class="result" style="display: none;"></div>
        </div>

        <!-- Withdrawal Section -->
        <div class="section">
            <h2><span class="icon">💸</span>Withdraw Money</h2>
            <form id="withdrawForm">
                <div class="form-group">
                    <label for="withdrawAccount">Account Number:</label>
                    <input type="text" id="withdrawAccount" name="accountNumber" required>
                </div>
                <div class="form-group">
                    <label for="withdrawAmount">Amount:</label>
                    <input type="number" id="withdrawAmount" name="amount" step="0.01" required>
                </div>
                <button type="submit">Withdraw</button>
            </form>
            <div id="withdrawResult" class="result" style="display: none;"></div>
        </div>

        <!-- Fund Transfer Section -->
        <div class="section">
            <h2><span class="icon">🔄</span>Fund Transfer</h2>
            <form id="transferForm">
                <div class="form-group">
                    <label for="fromAccount">From Account Number:</label>
                    <input type="text" id="fromAccount" name="fromAccountNumber" required>
                </div>
                <div class="form-group">
                    <label for="toAccount">To Account Number:</label>
                    <input type="text" id="toAccount" name="toAccountNumber" required>
                </div>
                <div class="form-group">
                    <label for="amount">Amount:</label>
                    <input type="number" id="amount" name="amount" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="description">Description:</label>
                    <textarea id="description" name="description" rows="3"></textarea>
                </div>
                <button type="submit">Transfer Funds</button>
            </form>
            <div id="transferResult" class="result" style="display: none;"></div>
        </div>

        <!-- View Data Section -->
        <div class="section view-section">
            <h2><span class="icon">📈</span>View Data</h2>
            <button class="btn-view" onclick="loadUsers()">👥 Load All Users</button>
            <button class="btn-view" onclick="loadAccounts()">🏦 Load All Accounts</button>
            <button class="btn-view" onclick="loadTransactions()">📄 Load All Transactions</button>

            <div id="dataResult"></div>
        </div>
    </div>

    <script>
        // User Registration
        document.getElementById('userForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const userData = Object.fromEntries(formData);

            console.log('Sending user data:', userData);

            try {
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                console.log('Response status:', response.status);
                const result = await response.text();
                console.log('Response:', result);
                showResult('userResult', result, response.ok);
                if (response.ok) e.target.reset();
            } catch (error) {
                console.error('Error:', error);
                showResult('userResult', 'Error: ' + error.message, false);
            }
        });

        // Account Creation
        document.getElementById('accountForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const formData = new FormData(e.target);

            console.log('Creating account for userId:', formData.get('userId'), 'type:', formData.get('accountType'));

            try {
                const response = await fetch(`/api/accounts/create?userId=${formData.get('userId')}&accountType=${formData.get('accountType')}`, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json' }
                });

                console.log('Account response status:', response.status);
                const result = await response.text();
                console.log('Account response:', result);
                showResult('accountResult', result, response.ok);
                if (response.ok) e.target.reset();
            } catch (error) {
                console.error('Account error:', error);
                showResult('accountResult', 'Error: ' + error.message, false);
            }
        });

        // Deposit Money
        document.getElementById('depositForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const formData = new FormData(e.target);

            try {
                const response = await fetch(`/api/accounts/deposit?accountNumber=${formData.get('accountNumber')}&amount=${formData.get('amount')}`, {
                    method: 'POST'
                });

                const result = await response.text();
                showResult('depositResult', result, response.ok);
                if (response.ok) e.target.reset();
            } catch (error) {
                showResult('depositResult', 'Error: ' + error.message, false);
            }
        });

        // Withdraw Money
        document.getElementById('withdrawForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const formData = new FormData(e.target);

            try {
                const response = await fetch(`/api/accounts/withdraw?accountNumber=${formData.get('accountNumber')}&amount=${formData.get('amount')}`, {
                    method: 'POST'
                });

                const result = await response.text();
                showResult('withdrawResult', result, response.ok);
                if (response.ok) e.target.reset();
            } catch (error) {
                showResult('withdrawResult', 'Error: ' + error.message, false);
            }
        });

        // Fund Transfer
        document.getElementById('transferForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const transferData = Object.fromEntries(formData);

            try {
                const response = await fetch(`/api/transactions/simple-transfer?fromAccount=${transferData.fromAccountNumber}&toAccount=${transferData.toAccountNumber}&amount=${transferData.amount}`, {
                    method: 'POST'
                });

                const result = await response.text();
                showResult('transferResult', result, response.ok);
                if (response.ok) e.target.reset();
            } catch (error) {
                showResult('transferResult', 'Error: ' + error.message, false);
            }
        });

        // Load Users
        async function loadUsers() {
            try {
                console.log('Loading users...');
                const response = await fetch('/api/users');
                console.log('Users response status:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const users = await response.json();
                console.log('Users data:', users);
                displayTable('dataResult', users, ['id', 'username', 'email', 'fullName', 'phoneNumber', 'createdAt'], 'Users');
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('dataResult').innerHTML = `<p style="color: red;">Error loading users: ${error.message}</p>`;
            }
        }

        // Load Accounts
        async function loadAccounts() {
            try {
                console.log('Loading accounts...');
                const response = await fetch('/api/accounts');
                console.log('Accounts response status:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const accounts = await response.json();
                console.log('Accounts data:', accounts);
                displayTable('dataResult', accounts, ['id', 'accountNumber', 'accountType', 'balance', 'createdAt'], 'Accounts');
            } catch (error) {
                console.error('Error loading accounts:', error);
                document.getElementById('dataResult').innerHTML = `<p style="color: red;">Error loading accounts: ${error.message}</p>`;
            }
        }

        // Load Transactions
        async function loadTransactions() {
            try {
                console.log('Loading transactions...');
                const response = await fetch('/api/transactions');
                console.log('Transactions response status:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const transactions = await response.json();
                console.log('Transactions data:', transactions);
                displayTable('dataResult', transactions, ['id', 'amount', 'transactionType', 'description', 'status', 'transactionDate'], 'Transactions');
            } catch (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('dataResult').innerHTML = `<p style="color: red;">Error loading transactions: ${error.message}</p>`;
            }
        }



        // Helper Functions
        function showResult(elementId, message, isSuccess) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = 'result ' + (isSuccess ? 'success' : 'error');
            element.style.display = 'block';
        }

        function displayTable(elementId, data, columns, title) {
            const element = document.getElementById(elementId);
            if (data.length === 0) {
                element.innerHTML = `<h3>${title}</h3><p>No data found.</p>`;
                return;
            }

            let html = `<h3>${title}</h3><table><thead><tr>`;
            columns.forEach(col => html += `<th>${col}</th>`);
            html += '</tr></thead><tbody>';

            data.forEach(item => {
                html += '<tr>';
                columns.forEach(col => {
                    let value = item[col];
                    if (value && typeof value === 'object' && value.id) {
                        value = `ID: ${value.id}`;
                    }
                    html += `<td>${value || ''}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            element.innerHTML = html;
        }
    </script>
</body>

</html>
