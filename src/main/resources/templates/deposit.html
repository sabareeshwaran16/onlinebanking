<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Money</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e67e22;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .back-btn {
            background: #7f8c8d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #e67e22;
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
        }

        button {
            background: #e67e22;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
        }

        .success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .error {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <button class="back-btn" onclick="location.href='/dashboard'">← Back to Dashboard</button>

        <div class="header">
            <h1>💰 Deposit Money</h1>
            <p>Add funds to your account</p>
        </div>

        <form id="depositForm">
            <div class="form-group">
                <label for="depositAccount">Account Number:</label>
                <input type="text" id="depositAccount" name="accountNumber" required>
            </div>
            <div class="form-group">
                <label for="depositAmount">Amount:</label>
                <input type="number" id="depositAmount" name="amount" step="0.01" required>
            </div>
            <button type="submit">Deposit</button>
        </form>
        <div id="depositResult" class="result" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('depositForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const formData = new FormData(e.target);

            try {
                const response = await fetch(`/api/accounts/deposit?accountNumber=${formData.get('accountNumber')}&amount=${formData.get('amount')}`, {
                    method: 'POST'
                });

                const result = await response.text();
                showResult('depositResult', result, response.ok);
                if (response.ok) e.target.reset();
            } catch (error) {
                showResult('depositResult', 'Error: ' + error.message, false);
            }
        });

        function showResult(elementId, message, isSuccess) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = 'result ' + (isSuccess ? 'success' : 'error');
            element.style.display = 'block';
        }
    </script>
</body>

</html>
