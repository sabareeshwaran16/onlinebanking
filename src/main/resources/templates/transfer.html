<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund Transfer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f39c12;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .back-btn {
            background: #7f8c8d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #f39c12;
            box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.1);
        }

        button {
            background: #f39c12;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
        }

        .success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .error {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <button class="back-btn" onclick="location.href='/dashboard'">← Back to Dashboard</button>

        <div class="header">
            <h1>🔄 Fund Transfer</h1>
            <p>Transfer money between accounts</p>
        </div>

        <form id="transferForm">
            <div class="form-group">
                <label for="fromAccount">From Account Number:</label>
                <input type="text" id="fromAccount" name="fromAccountNumber" required>
            </div>
            <div class="form-group">
                <label for="toAccount">To Account Number:</label>
                <input type="text" id="toAccount" name="toAccountNumber" required>
            </div>
            <div class="form-group">
                <label for="amount">Amount:</label>
                <input type="number" id="amount" name="amount" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" name="description" rows="3"></textarea>
            </div>
            <button type="submit">Transfer Funds</button>
        </form>
        <div id="transferResult" class="result" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('transferForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const transferData = Object.fromEntries(formData);

            try {
                const response = await fetch(`/api/transactions/simple-transfer?fromAccount=${transferData.fromAccountNumber}&toAccount=${transferData.toAccountNumber}&amount=${transferData.amount}`, {
                    method: 'POST'
                });

                const result = await response.text();
                showResult('transferResult', result, response.ok);
                if (response.ok) e.target.reset();
            } catch (error) {
                showResult('transferResult', 'Error: ' + error.message, false);
            }
        });

        function showResult(elementId, message, isSuccess) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = 'result ' + (isSuccess ? 'success' : 'error');
            element.style.display = 'block';
        }
    </script>
</body>

</html>
